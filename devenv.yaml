inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/nixpkgs-unstable
  treefmt-nix:
    url: github:numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  dvnv-instructions-composer:
    url: github:Alb-O/dvnv-instructions-composer
    flake: false
  agent-scripts:
    url: github:Alb-O/agent-scripts
    flake: false
  dvnv-docs-env:
    url: github:Alb-O/dvnv-docs-env
    flake: false
  dvnv-local-inputs:
    url: github:Alb-O/dvnv-local-inputs
    flake: false
imports:
  - dvnv-instructions-composer
  - agent-scripts
  - dvnv-docs-env
  - dvnv-local-inputs

